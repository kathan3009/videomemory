name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    name: pytest (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-14]
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v3
        with:
          version: "0.11.11"
          enable-cache: true

      - name: Install ffmpeg + TTS (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg espeak-ng yt-dlp

      - name: Install ffmpeg + yt-dlp (macOS, TTS pre-installed)
        if: runner.os == 'macOS'
        run: brew install ffmpeg yt-dlp

      - name: Sync deps
        run: uv sync --extra dev

      - name: Lint
        run: uv run ruff check .

      - name: Test (unit + library)
        run: uv run pytest tests/test_unit.py tests/test_library.py -q

      - name: Test (integration + MCP + HTTP)
        run: uv run pytest tests/test_integration.py tests/test_http_server.py tests/test_mcp_stdio.py -q

  docker:
    name: docker build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: docker build -t videomemory .
