# fly.toml — example.com (hosted demo + remote MCP).
# Build:   flyctl launch --copy-config --no-deploy
# Deploy:  flyctl deploy
# Cert:    flyctl certs add example.com

app = "videomemory"
primary_region = "ord"      # change to your nearest region

[build]
  dockerfile = "Dockerfile"

[env]
  VIDEOMEMORY_DATA_DIR = "/data"
  VIDEOMEMORY_MAX_VIDEO_SECONDS = "1800"   # 30-min cap on public ingests
  HF_HOME = "/opt/hf"
  TOKENIZERS_PARALLELISM = "false"

[[mounts]]
  source = "videomemory_data"
  destination = "/data"
  initial_size = "20gb"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = "stop"      # cold-start tolerable; saves $
  auto_start_machines = true
  min_machines_running = 0

  [http_service.concurrency]
    type = "requests"
    soft_limit = 20
    hard_limit = 40

  [[http_service.checks]]
    grace_period = "20s"
    interval = "15s"
    method = "GET"
    timeout = "5s"
    path = "/healthz"

[[vm]]
  size = "performance-2x"     # 2 vCPU / 4 GB — enough for v0.2
  memory = "4gb"
