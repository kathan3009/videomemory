# fly.toml — VideoMemory backend (FastAPI + qdrant-local on a persistent volume)
# Run: flyctl launch --copy-config --no-deploy   then   flyctl deploy

app = "videomemory-api"
primary_region = "ord"     # change to a region near you (sjc / iad / lhr / fra / etc.)
kill_signal = "SIGINT"
kill_timeout = "30s"

[build]
  dockerfile = "Dockerfile.api"

[env]
  VIDEOMEMORY_DATA_DIR = "/data"
  VIDEOMEMORY_QDRANT_IN_MEMORY = "true"
  VIDEOMEMORY_MAX_VIDEO_SECONDS = "1800"   # 30-min cap on public ingests
  HF_HOME = "/data/.cache/huggingface"

[[mounts]]
  source = "videomemory_data"
  destination = "/data"
  initial_size = "50gb"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = "off"     # ML model load is slow; keep machine warm
  auto_start_machines = true
  min_machines_running = 1

  [http_service.concurrency]
    type = "requests"
    soft_limit = 20
    hard_limit = 40

  [[http_service.checks]]
    grace_period = "30s"
    interval = "15s"
    method = "GET"
    timeout = "5s"
    path = "/healthz"

[[vm]]
  size = "performance-4x"   # 4 vCPU / 8 GB RAM
  memory = "8gb"
